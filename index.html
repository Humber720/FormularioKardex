      </select>

      <label for="celular_estudiante">Nro celular del Estudiante:</label>
      <input type="tel" id="celular_estudiante" name="celular_estudiante"
      placeholder="Ej: 71234567" maxlength="8" pattern="[0-9]{8}" inputmode="numeric" required />

      <label for="celular_padre">Nro celular del Padre, Madre o tutor del estudiante:</label>
      <input type="tel" id="celular_padre" name="celular_padre"
      placeholder="Ej: 71234567" maxlength="8" pattern="[0-9]{8}" inputmode="numeric" required />

      <label for="direccion">Dirección actual:</label>
      <input type="text" id="direccion" name="direccion"
      placeholder="Zona, calle, referencia" required />

      <label for="numero_vivienda">Nro de la vivienda:</label>
      <input type="text" id="numero_vivienda" name="numero_vivienda"
      placeholder="Ej: 123, S/N, Lote 5" required />

      <button type="submit">Enviar</button>

    </form>
    <div id="modal" class="modal">
      <div class="modal-contenido">
        <p id="modal-mensaje">✅ ¡Formulario enviado correctamente!</p>
        <button id="cerrar-modal">Cerrar</button>
      </div>
    </div>
